<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحلل الاستراتيجي المزدوج - النسخة المصححة</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --panel: #161616; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .app-container { border: 2px solid var(--gold); background: var(--panel); border-radius: 20px; padding: 15px; width: 100%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        
        .decision-box { 
            background: #000; border: 3px solid var(--blue); border-radius: 15px; padding: 20px; 
            text-align: center; margin-bottom: 15px; transition: 0.3s;
        }
        .decision-title { font-size: 0.85em; color: #888; margin-bottom: 8px; }
        .decision-value { font-size: 1.5em; font-weight: bold; color: white; }

        .profit-bar { text-align: center; font-size: 1.6em; font-weight: bold; margin: 10px 0; color: var(--green); }

        .input-section { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #444; background: #000; color: var(--gold); font-size: 1.4em; text-align: center; outline: none; }
        .btn-add { background: var(--gold); color: black; font-weight: bold; border: none; border-radius: 12px; padding: 0 25px; cursor: pointer; font-size: 1.1em; }
        .btn-add:active { transform: scale(0.95); background: #b8962d; }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-win { background: var(--green); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-loss { background: var(--red); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .history-tag { font-size: 0.8em; color: #666; text-align: center; background: #000; padding: 8px; border-radius: 8px; min-height: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="decision-box" id="decisionDisplay">
        <div class="decision-title">التوقع المزدوج الموزون:</div>
        <div class="decision-value" id="nextMove">أدخل 5 أرقام</div>
    </div>

    <div class="profit-bar" id="profitVal">0.00</div>

    <div class="input-section">
        <input type="number" id="numIn" placeholder="الرقم" inputmode="numeric" onkeydown="if(event.key==='Enter') pushData()">
        <button class="btn-add" onclick="pushData()">سجل</button>
    </div>

    <div class="action-btns">
        <button class="btn-win" onclick="updateMoney(true)">ربح ✅</button>
        <button class="btn-loss" onclick="updateMoney(false)">خسارة ❌</button>
    </div>

    <div class="history-tag" id="hist">السجل: فارغ</div>
    <button style="width:100%; background:none; border:none; color:#444; font-size:0.7em; margin-top:15px; text-decoration:underline; cursor:pointer;" onclick="clearAll()">تصفير شامل للبيانات</button>
</div>

<script>
    const REDS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    // استخدام مفتاح جديد تماماً لضمان عدم حدوث تضارب
    let state = JSON.parse(localStorage.getItem('roulette_v10_final')) || { history: [], profit: 0 };

    function pushData() {
        const inputElem = document.getElementById('numIn');
        const val = parseInt(inputElem.value);
        
        if (isNaN(val) || val < 0 || val > 36) {
            return;
        }
        
        state.history.push(val);
        inputElem.value = "";
        inputElem.focus();
        refresh();
    }

    function updateMoney(win) {
        state.profit += win ? 10 : -10;
        refresh();
    }

    function getStreak(arr, checkFunc) {
        let count = 0;
        for (let i = arr.length - 1; i >= 0; i--) {
            if (checkFunc(arr[i])) count++; else break;
        }
        return count;
    }

    function refresh() {
        localStorage.setItem('roulette_v10_final', JSON.stringify(state));
        const hist = state.history;
        const total = hist.length;

        // تحديث الربح
        const pDisp = document.getElementById('profitVal');
        pDisp.innerText = state.profit.toFixed(2);
        pDisp.style.color = state.profit >= 0 ? "#2ecc71" : "#e74c3c";

        if (total < 5) {
            document.getElementById('nextMove').innerText = `بانتظار ${5 - total} أرقام`;
            return;
        }

        // منطق التحليل الموزون
        const isEven = n => n !== 0 && n % 2 === 0;
        const isOdd = n => n !== 0 && n % 2 !== 0;
        const isRed = n => REDS.includes(n);
        const isBlack = n => n !== 0 && !REDS.includes(n);

        let s = {
            even: getStreak(hist, isEven),
            odd: getStreak(hist, isOdd),
            red: getStreak(hist, isRed),
            black: getStreak(hist, isBlack)
        };

        // تحليل اللون
        let rP = hist.filter(isRed).length / total;
        let cMove = "";
        let cScore = 0;
        if (s.red >= 3) cMove = "انتظر (أحمر مكرر)";
        else if (s.black >= 3) cMove = "انتظر (أسود مكرر)";
        else if (rP < 0.45) { cMove = "أحمر 🔴"; cScore = 1; }
        else if (rP > 0.55) { cMove = "أسود ⚫"; cScore = 1; }

        // تحليل النوع
        let eP = hist.filter(isEven).length / total;
        let tMove = "";
        let tScore = 0;
        if (s.even >= 3) tMove = "انتظر (زوجي مكرر)";
        else if (s.odd >= 3) tMove = "انتظر (فردي مكرر)";
        else if (eP < 0.45) { tMove = "زوجي 🔢"; tScore = 1; }
        else if (eP > 0.55) { tMove = "فردي 🔢"; tScore = 1; }

        // الدمج والوزن
        let finalMove = "اللعبة متوازنة";
        let finalColor = "#3498db";

        if (cScore > 0 && tScore > 0) {
            finalMove = cMove + " + " + tMove;
            finalColor = "#2ecc71";
        } else if (cScore > 0) {
            finalMove = cMove;
            finalColor = cMove.includes("أحمر") ? "#e74c3c" : "#ffffff";
        } else if (tScore > 0) {
            finalMove = tMove;
            finalColor = tMove.includes("زوجي") ? "#2ecc71" : "#d4af37";
        } else if (cMove.includes("انتظر") || tMove.includes("انتظر")) {
            finalMove = "نمط مستمر.. لا تراهن";
            finalColor = "#f1c40f";
        }

        document.getElementById('nextMove').innerText = finalMove;
        document.getElementById('decisionDisplay').style.borderColor = finalColor;
        document.getElementById('hist').innerText = "آخر 5: " + hist.slice(-5).reverse().join(" | ");
    }

    function clearAll() {
        if(confirm("هل أنت متأكد من مسح جميع البيانات؟")) {
            state = { history: [], profit: 0 };
            localStorage.removeItem('roulette_v10_final');
            refresh();
            location.reload();
        }
    }

    // التشغيل الأول
    refresh();
</script>
</body>
</html>
